<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ARMEK Yönetim Özeti</title><style>body{margin:0;background:#f3f7fb;color:#102d49;font-family:Arial,sans-serif}.wrap{width:min(1080px,calc(100% - 32px));margin:40px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:20px}.top a,.quick a{background:#0868c7;color:#fff;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:700}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin:28px 0}.card,.panel{background:#fff;border:1px solid #dce8f2;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(10,55,91,.07)}.card b{font-size:34px;display:block;margin-top:8px}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.quick a{text-align:center;background:#0b3155}.panel h2{margin-top:0}@media(max-width:720px){.cards,.quick{grid-template-columns:1fr 1fr}}@media(max-width:460px){.cards,.quick{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="wrap"><div class="top"><div><h1>ARMEK Yönetim Özeti</h1><p>İçerik sayıları ve hızlı yönetim bağlantıları.</p></div><a href="/admin/">Yönetici Paneline Dön</a></div><section class="cards"><div class="card">Ürünler<b id="products">0</b></div><div class="card">Yapılan İşler<b id="works">0</b></div><div class="card">Yorumlar<b id="testimonials">0</b></div><div class="card">Kampanyalar<b id="campaigns">0</b></div></section><section class="panel"><h2>Hızlı İşlemler</h2><div class="quick"><a href="/admin/#/collections/products_management">Ürünleri Yönet</a><a href="/admin/#/collections/works_management">İşleri Yönet</a><a href="/admin/#/collections/campaigns_management">Kampanyaları Yönet</a><a href="/admin/#/collections/testimonials_management">Yorumları Yönet</a><a href="/admin/#/collections/site_management">Site Ayarları</a><a href="/admin/#/media">Medya Kütüphanesi</a></div></section></main><script>Promise.all(['products','works','testimonials','campaigns'].map(n=>fetch('/'+n+'.json?v='+Date.now()).then(r=>r.json()).then(d=>[n,(d[n]||[]).length]).catch(()=>[n,0]))).then(rows=>rows.forEach(([n,v])=>document.getElementById(n).textContent=v));</script></body></html>
