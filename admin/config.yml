backend:
  name: github
  repo: armeksuaritma/armek-website
  branch: main
  base_url: https://armek-cms-auth.armeksuaritma.workers.dev
  auth_endpoint: auth
site_url: https://armeksuaritma.com.tr
display_url: https://armeksuaritma.com.tr
logo_url: /armek-logo.jpg
locale: tr
media_folder: uploads
public_folder: /uploads
publish_mode: simple
collections:
- name: home_management
  label: Ana Sayfa
  files:
  - name: home
    label: Ana Sayfa Ayarları
    file: home.json
    format: json
    fields:
    - label: Ana görsel türü
      name: heroMediaType
      widget: select
      default: image
      options:
      - label: Sabit görsel
        value: image
      - label: Otomatik MP4 video
        value: video
      - label: Görsel slider
        value: slider
    - label: Küçük başlık
      name: heroEyebrow
      widget: string
      required: false
    - label: Ana başlık
      name: heroTitle
      widget: string
      required: false
    - label: Ana açıklama
      name: heroText
      widget: text
      required: false
    - label: Sabit ana görsel
      name: heroImage
      widget: image
      required: false
    - label: MP4 video
      name: heroVideo
      widget: file
      required: false
      hint: MP4/H.264 önerilir. Video sessiz, kontrolsüz, otomatik ve sürekli oynar.
    - label: Video kapak görseli
      name: heroVideoPoster
      widget: image
      required: false
    - label: Slider görselleri
      name: heroSlides
      widget: list
      required: false
      default: []
      fields:
      - label: Görsel
        name: image
        widget: image
      - label: Görsel açıklaması
        name: alt
        widget: string
        required: false
    - label: Deneyim sayacı
      name: statExperience
      widget: string
      required: false
    - label: Servis sayacı
      name: statService
      widget: string
      required: false
    - label: Kurumsal görsel
      name: aboutImage
      widget: image
      required: false
    - label: Kurumsal başlık
      name: aboutTitle
      widget: string
      required: false
    - label: Kurumsal açıklama
      name: aboutText
      widget: text
      required: false
    - label: Avantajlar
      name: advantages
      widget: list
      required: false
      field:
        label: Avantaj
        name: item
        widget: string
- name: products_management
  label: Ürünler
  files:
  - name: products
    label: Ürün Listesi
    file: products.json
    format: json
    fields:
    - label: Ürünler
      name: products
      widget: list
      add_to_top: true
      summary: '{{fields.name}} — {{fields.category}}'
      fields:
      - label: Kapak fotoğrafı
        name: image
        widget: image
      - label: Ek fotoğraflar
        name: images
        widget: list
        required: false
        default: []
        field:
          label: Fotoğraf
          name: image
          widget: image
          required: false
      - label: Ürün adı
        name: name
        widget: string
      - label: SEO adresi (isteğe bağlı)
        name: slug
        widget: string
        required: false
        hint: 'Boş bırakırsanız ürün adından otomatik oluşturulur. Örn: n-ro-pompasiz'
      - label: Ana kategori
        name: category
        widget: string
        hint: Kategori Yönetimi bölümündeki ana kategori adını aynen yazın.
      - label: Alt kategori
        name: subcategory
        widget: string
        required: false
        hint: 'Örn: Jet Pompalar, Paket Hidroforlar, Ev Tipi'
      - label: Kısa açıklama
        name: description
        widget: text
        required: false
      - label: Detaylı ürün açıklaması
        name: longDescription
        widget: markdown
        required: false
        hint: Kimler için uygun, kullanım alanı, bakım ve avantajlar gibi özgün bilgiler yazın.
      - label: Google başlığı
        name: seoTitle
        widget: string
        required: false
        hint: Boş bırakılırsa otomatik oluşturulur.
      - label: Google açıklaması
        name: seoDescription
        widget: text
        required: false
        hint: Boş bırakılırsa ürün bilgilerinden otomatik oluşturulur.
      - &id001
        label: Anahtar kelimeler / konu notları
        name: seoKeywords
        widget: string
        required: false
        hint: Google için zorunlu değildir; içerik planlama amacıyla virgülle ayırabilirsiniz.
      - &id002
        label: Canonical adres
        name: canonicalUrl
        widget: string
        required: false
        hint: Genellikle boş bırakın. Aynı içeriğin başka adresi varsa asıl adresi yazın.
      - &id003
        label: Arama motoru görünürlüğü
        name: robots
        widget: select
        required: false
        default: index,follow
        options:
        - label: Google’da göster
          value: index,follow
        - label: Google’da gösterme
          value: noindex,follow
      - &id004
        label: Sosyal paylaşım başlığı
        name: ogTitle
        widget: string
        required: false
      - &id005
        label: Sosyal paylaşım açıklaması
        name: ogDescription
        widget: text
        required: false
      - &id006
        label: Sosyal paylaşım görseli
        name: ogImage
        widget: image
        required: false
        hint: Önerilen ölçü 1200×630 px.
      - label: Marka
        name: brand
        widget: string
        required: false
      - label: Model
        name: model
        widget: string
        required: false
      - label: Ürün özellikleri
        name: featureText
        widget: text
        required: false
        hint: Her özelliği ayrı satıra yazın. Sitede alt alta görünür.
      - label: Fiyat
        name: price
        widget: string
        required: false
      - label: Etiket
        name: badge
        widget: select
        required: false
        options:
        - Yeni
        - Kampanya
        - Çok Satan
        - Tavsiye Edilen
      - label: Sıralama
        name: order
        widget: number
        required: false
        value_type: int
        default: 100
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: works_management
  label: Yaptığımız İşler
  files:
  - name: works
    label: İş Galerisi
    file: works.json
    format: json
    fields:
    - label: Çalışmalar
      name: works
      widget: list
      add_to_top: true
      summary: '{{fields.title}} — {{fields.location}}'
      fields:
      - label: Kapak fotoğrafı
        name: image
        widget: image
      - label: Diğer fotoğraflar
        name: images
        widget: list
        required: false
        default: []
        field:
          label: Fotoğraf
          name: image
          widget: image
          required: false
      - label: Başlık
        name: title
        widget: string
      - label: SEO adresi (isteğe bağlı)
        name: slug
        widget: string
        required: false
        hint: Boş bırakırsanız başlıktan otomatik oluşturulur.
      - label: Kategori
        name: category
        widget: select
        options:
        - Montaj
        - Filtre Değişimi
        - Teknik Servis
        - Cihaz Satışı
        - Hidrofor Montajı
        - Hidrofor Servisi
        - Su Yumuşatma Montajı
        - Filtrasyon Sistemi
        - Diğer
      - label: İlçe / konum
        name: location
        widget: string
        required: false
      - label: Tarih
        name: date
        widget: datetime
        format: DD.MM.YYYY
        date_format: DD.MM.YYYY
        time_format: false
        required: false
      - label: Açıklama
        name: text
        widget: text
        required: false
      - label: Detaylı çalışma açıklaması
        name: longDescription
        widget: markdown
        required: false
        hint: Yapılan işlem, kullanılan ürün, sorun ve çözüm gibi özgün ayrıntılar ekleyin.
      - label: Google başlığı
        name: seoTitle
        widget: string
        required: false
      - label: Google açıklaması
        name: seoDescription
        widget: text
        required: false
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      - *id006
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: campaigns_management
  label: Kampanyalar
  files:
  - name: campaigns
    label: Kampanya Listesi
    file: campaigns.json
    format: json
    fields:
    - label: Kampanyalar
      name: campaigns
      widget: list
      add_to_top: true
      summary: '{{fields.title}}'
      fields:
      - label: Başlık
        name: title
        widget: string
      - label: Açıklama
        name: text
        widget: text
      - label: Görsel
        name: image
        widget: image
      - label: Fiyat kartları
        name: prices
        widget: list
        required: false
        fields:
        - label: Ürün / hizmet
          name: title
          widget: string
        - label: Fiyat
          name: price
          widget: string
        - label: Not
          name: note
          widget: string
          required: false
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: testimonials_management
  label: Müşteri Yorumları
  files:
  - name: testimonials
    label: Yorum Listesi
    file: testimonials.json
    format: json
    fields:
    - label: Yorumlar
      name: testimonials
      widget: list
      add_to_top: true
      summary: '{{fields.name}} — {{fields.rating}} yıldız'
      fields:
      - label: Müşteri adı
        name: name
        widget: string
      - label: İlçe / konum
        name: location
        widget: string
        required: false
      - label: Yıldız
        name: rating
        widget: number
        min: 1
        max: 5
        value_type: int
        default: 5
      - label: Yorum
        name: text
        widget: text
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: services_management
  label: Hizmetler
  files:
  - name: services
    label: Hizmet Listesi
    file: services.json
    format: json
    fields:
    - label: Hizmetler
      name: services
      widget: list
      add_to_top: true
      summary: '{{fields.title}}'
      fields:
      - label: Başlık
        name: title
        widget: string
      - label: SEO adresi (isteğe bağlı)
        name: slug
        widget: string
        required: false
        hint: 'Boş bırakırsanız başlıktan otomatik oluşturulur. Örn: antalya-hidrofor-servisi'
      - label: Kısa açıklama
        name: text
        widget: text
      - label: Detaylı hizmet açıklaması
        name: longDescription
        widget: markdown
        required: false
        hint: Hizmet kapsamı, kullanım alanları ve avantajları yazın.
      - label: Google başlığı
        name: seoTitle
        widget: string
        required: false
      - label: Google açıklaması
        name: seoDescription
        widget: text
        required: false
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      - *id006
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: faqs_management
  label: S.S.S.
  files:
  - name: faqs
    label: Soru Listesi
    file: faqs.json
    format: json
    fields:
    - label: Sorular
      name: faqs
      widget: list
      add_to_top: true
      summary: '{{fields.q}}'
      fields:
      - label: Soru
        name: q
        widget: string
      - label: Cevap
        name: a
        widget: text
      - label: Yayında
        name: active
        widget: boolean
        default: true
- name: articles_management
  label: Bilgi Yazıları ve SEO
  files:
  - name: articles
    label: SEO Bilgi Yazıları
    file: articles.json
    format: json
    fields:
    - label: Yazılar
      name: articles
      widget: list
      add_to_top: true
      summary: '{{fields.title}}'
      fields:
      - label: Başlık
        name: title
        widget: string
      - label: SEO adresi
        name: slug
        widget: string
        required: false
      - label: Kapak görseli
        name: image
        widget: image
        required: false
      - label: Kısa özet
        name: summary
        widget: text
      - label: Yazı içeriği
        name: body
        widget: markdown
      - label: AI İçerik Yardımcısı İçin Bilgiler
        name: aiBrief
        widget: object
        required: false
        collapsed: true
        hint: Bu alanlar içerik üretirken kullanılacak özeti saklar. Otomatik üretim düğmesi için ayrıca güvenli AI bağlantısı
          gerekir.
        fields:
        - label: Ana konu
          name: topic
          widget: string
          required: false
        - label: Hedef müşteri
          name: audience
          widget: string
          required: false
          hint: 'Örn: Antalya’da villa sahipleri'
        - label: Vurgulanacak hizmetler
          name: services
          widget: text
          required: false
        - label: Yazı tonu
          name: tone
          widget: select
          required: false
          default: professional
          options:
          - label: Profesyonel ve anlaşılır
            value: professional
          - label: Satış odaklı
            value: sales
          - label: Teknik
            value: technical
          - label: Samimi
            value: friendly
        - label: Ek notlar
          name: notes
          widget: text
          required: false
      - label: Google başlığı
        name: seoTitle
        widget: string
        required: false
        hint: Yaklaşık 50–60 karakter. Ana hizmet ve Antalya ifadesini doğal biçimde kullanın.
      - label: Google açıklaması
        name: seoDescription
        widget: text
        required: false
        hint: Yaklaşık 140–160 karakter. Hizmeti, faydayı ve iletişim çağrısını anlatın.
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      - *id006
      - label: Yayın tarihi
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: Yayında
        name: active
        widget: boolean
        default: true
      hint: Yazı içeriği, sosyal paylaşım ve gelişmiş SEO alanları aynı kayıtta yönetilir.
- name: settings_management
  label: Site Ayarları
  files:
  - name: settings
    label: İletişim ve Görünürlük
    file: settings.json
    format: json
    fields:
    - label: İşletme adı
      name: businessName
      widget: string
      required: false
    - label: Logo
      name: logoImage
      widget: image
      required: false
    - label: Üst bilgi
      name: topbarText
      widget: string
      required: false
    - label: Telefon görünümü
      name: phoneDisplay
      widget: string
      required: false
    - label: Telefon / WhatsApp (90 ile)
      name: phoneLink
      widget: string
      required: false
    - label: WhatsApp mesajı
      name: whatsappMessage
      widget: text
      required: false
    - label: Facebook
      name: facebook
      widget: string
      required: false
    - label: Instagram
      name: instagram
      widget: string
      required: false
    - label: Adres / hizmet alanı
      name: addressText
      widget: string
      required: false
    - label: Açık adres
      name: streetAddress
      widget: string
      required: false
    - label: İlçe
      name: addressDistrict
      widget: string
      required: false
    - label: Posta kodu
      name: postalCode
      widget: string
      required: false
    - label: E-posta
      name: email
      widget: string
      required: false
    - label: Çalışma saatleri
      name: openingHours
      widget: string
      required: false
      hint: 'Örn: Mo-Sa 09:00-19:00'
    - label: Alt bilgi
      name: footerText
      widget: string
      required: false
    - label: Hizmet bölgeleri
      name: areas
      widget: list
      required: false
      field:
        label: Bölge
        name: item
        widget: string
    - label: Bölüm görünürlükleri
      name: visibility
      widget: object
      required: false
      fields:
      - label: Ürünler
        name: products
        widget: boolean
        default: true
      - label: Kampanya
        name: campaign
        widget: boolean
        default: true
      - label: Hizmetler
        name: services
        widget: boolean
        default: true
      - label: Yaptığımız işler
        name: works
        widget: boolean
        default: true
      - label: Kurumsal
        name: about
        widget: boolean
        default: true
      - label: Yorumlar
        name: testimonials
        widget: boolean
        default: true
      - label: Hizmet bölgeleri
        name: areas
        widget: boolean
        default: true
      - label: S.S.S.
        name: faq
        widget: boolean
        default: true
- name: seo_management
  label: SEO Merkezi
  files:
  - name: seo
    label: SEO Merkezi ve Google Ayarları
    file: seo.json
    format: json
    fields:
    - label: Google sayfa başlığı
      name: seoTitle
      widget: string
      required: false
    - label: Google açıklaması
      name: seoDescription
      widget: text
      required: false
    - label: Sosyal paylaşım görseli
      name: seoImage
      widget: image
      required: false
    - label: Google Search Console doğrulama kodu
      name: googleSiteVerification
      widget: string
      required: false
    - label: Google Analytics Ölçüm Kimliği
      name: analyticsMeasurementId
      widget: string
      required: false
      default: G-DQBRPFTJ5J
      hint: 'G- ile başlayan kod. Örnek: G-DQBRPFTJ5J'
    - label: Canonical ana adres
      name: canonicalUrl
      widget: string
      required: false
      default: https://armeksuaritma.com.tr/
    - label: Varsayılan sosyal paylaşım başlığı
      name: ogTitle
      widget: string
      required: false
    - label: Varsayılan sosyal paylaşım açıklaması
      name: ogDescription
      widget: text
      required: false
    - label: İşletme kısa adı
      name: businessShortName
      widget: string
      required: false
      default: ARMEK
    - label: Schema işletme türü
      name: schemaType
      widget: select
      required: false
      default: LocalBusiness
      options:
      - LocalBusiness
      - HomeAndConstructionBusiness
      - Store
    - label: Google harita profil bağlantısı
      name: googleBusinessUrl
      widget: string
      required: false
    - label: Varsayılan robots ayarı
      name: robots
      widget: select
      required: false
      default: index,follow
      options:
      - label: Google’da göster
        value: index,follow
      - label: Google’da gösterme
        value: noindex,follow
- name: homepage_builder_management
  label: Dinamik Ana Sayfa
  files:
  - name: homepage_builder
    label: Ana Sayfa Bölümleri
    file: homepage-builder.json
    format: json
    fields:
    - label: Sayfa Bölümleri
      name: sections
      widget: list
      add_to_top: false
      summary: '{{fields.label}} — {{fields.type}}'
      hint: Bölümleri sürükleyerek sıralayın. Silinen veya kapatılan bölüm sitede görünmez. Ürün, soru, hizmet ve yorum içerikleri
        silinmez.
      fields:
      - label: Yönetimde görünen ad
        name: label
        widget: string
      - label: Benzersiz kimlik
        name: id
        widget: string
        hint: 'Boşluk kullanmayın. Örn: jet-pompa-tanitim'
      - label: Bölüm türü
        name: type
        widget: select
        options:
        - label: Ana kapak
          value: hero
        - label: Hızlı bilgi şeridi
          value: quick
        - label: Ürünler
          value: products
        - label: Kampanya
          value: campaign
        - label: Hizmetler
          value: services
        - label: Yaptığımız işler
          value: works
        - label: Neden ARMEK
          value: about
        - label: Müşteri yorumları
          value: testimonials
        - label: Hizmet bölgeleri
          value: areas
        - label: Sık sorulan sorular
          value: faq
        - label: İletişim
          value: contact
        - label: Yeni özel bölüm
          value: custom
      - label: Bölüm açık
        name: enabled
        widget: boolean
        default: true
      - label: Küçük üst başlık
        name: eyebrow
        widget: string
        required: false
      - label: Ana başlık
        name: title
        widget: string
        required: false
      - label: Açıklama
        name: text
        widget: markdown
        required: false
      - label: Bölüm bağlantı adı
        name: anchor
        widget: string
        required: false
        hint: 'Örn: jet-pompalar. Menü bağlantısı #jet-pompalar olur.'
      - label: Görsel
        name: image
        widget: image
        required: false
      - label: Görsel açıklaması
        name: imageAlt
        widget: string
        required: false
      - label: Görsel konumu
        name: imagePosition
        widget: select
        options:
        - label: Sol
          value: left
        - label: Sağ
          value: right
        default: left
        required: false
      - label: Buton yazısı
        name: buttonText
        widget: string
        required: false
      - label: Arka plan rengi
        name: backgroundColor
        widget: color
        required: false
      - label: Yazı rengi
        name: textColor
        widget: color
        required: false
      - label: Açık gri arka plan
        name: softBackground
        widget: boolean
        default: false
        required: false
      - label: Butonlar (özel bölüm için)
        name: buttons
        widget: list
        required: false
        fields:
        - label: Buton yazısı
          name: text
          widget: string
        - label: Bağlantı
          name: url
          widget: string
        - label: Görünüm
          name: style
          widget: select
          options:
          - label: Ana
            value: primary
          - label: İkinci
            value: secondary
          default: primary
        - label: Yeni sekmede aç
          name: newTab
          widget: boolean
          default: false
- name: categories_management
  label: Kategori Yönetimi
  files:
  - name: categories
    label: Ana ve Alt Kategoriler
    file: categories.json
    format: json
    fields:
    - label: Kategoriler
      name: categories
      widget: list
      add_to_top: true
      summary: '{{fields.name}}'
      fields:
      - label: Kategori adı
        name: name
        widget: string
      - label: Sayfa adresi
        name: slug
        widget: string
        required: false
      - label: Açıklama
        name: description
        widget: text
        required: false
      - &id007
        label: Google başlığı
        name: seoTitle
        widget: string
        required: false
      - &id008
        label: Google açıklaması
        name: seoDescription
        widget: text
        required: false
      - label: Sosyal paylaşım görseli
        name: ogImage
        widget: image
        required: false
      - label: Kategori görseli
        name: image
        widget: image
        required: false
      - label: Sıralama
        name: order
        widget: number
        value_type: int
        default: 100
      - label: Yayında
        name: active
        widget: boolean
        default: true
      - label: Alt kategoriler
        name: children
        widget: list
        required: false
        fields:
