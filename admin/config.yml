backend:
  name: github
  repo: armeksuaritma/armek-website
  branch: main
  base_url: https://armek-cms-auth.armeksuaritma.workers.dev
  auth_endpoint: auth

site_url: https://armeksuaritma.com.tr
display_url: https://armeksuaritma.com.tr
logo_url: /armek-logo.jpg
locale: tr
media_folder: "uploads"
public_folder: "/uploads"
publish_mode: simple

collections:
  - name: "home_management"
    label: "Ana Sayfa"
    files:
      - name: "home"
        label: "Ana Sayfa Ayarları"
        file: "home.json"
        format: "json"
        fields:
          - label: "Ana görsel türü"
            name: "heroMediaType"
            widget: "select"
            default: "image"
            options:
              - {label: "Sabit görsel", value: "image"}
              - {label: "Otomatik MP4 video", value: "video"}
              - {label: "Görsel slider", value: "slider"}
          - {label: "Küçük başlık", name: "heroEyebrow", widget: "string", required: false}
          - {label: "Ana başlık", name: "heroTitle", widget: "string", required: false}
          - {label: "Ana açıklama", name: "heroText", widget: "text", required: false}
          - {label: "Sabit ana görsel", name: "heroImage", widget: "image", required: false}
          - label: "MP4 video"
            name: "heroVideo"
            widget: "file"
            required: false
            hint: "MP4/H.264 önerilir. Video sessiz, kontrolsüz, otomatik ve sürekli oynar."
          - {label: "Video kapak görseli", name: "heroVideoPoster", widget: "image", required: false}
          - label: "Slider görselleri"
            name: "heroSlides"
            widget: "list"
            required: false
            default: []
            fields:
              - {label: "Görsel", name: "image", widget: "image"}
              - {label: "Görsel açıklaması", name: "alt", widget: "string", required: false}
          - {label: "Deneyim sayacı", name: "statExperience", widget: "string", required: false}
          - {label: "Servis sayacı", name: "statService", widget: "string", required: false}
          - {label: "Kurumsal görsel", name: "aboutImage", widget: "image", required: false}
          - {label: "Kurumsal başlık", name: "aboutTitle", widget: "string", required: false}
          - {label: "Kurumsal açıklama", name: "aboutText", widget: "text", required: false}
          - label: "Avantajlar"
            name: "advantages"
            widget: "list"
            required: false
            field: {label: "Avantaj", name: "item", widget: "string"}

  - name: "products_management"
    label: "Ürünler"
    files:
      - name: "products"
        label: "Ürün Listesi"
        file: "products.json"
        format: "json"
        fields:
          - label: "Ürünler"
            name: "products"
            widget: "list"
            add_to_top: true
            summary: "{{fields.name}} — {{fields.category}}"
            fields:
              - {label: "Kapak fotoğrafı", name: "image", widget: "image"}
              - label: "Ek fotoğraflar"
                name: "images"
                widget: "list"
                required: false
                default: []
                field: {label: "Fotoğraf", name: "image", widget: "image", required: false}
              - {label: "Ürün adı", name: "name", widget: "string"}
              - {label: "Kategori", name: "category", widget: "select", options: ["Su Arıtma Cihazları", "Filtreler", "Tanklar", "Yedek Parçalar", "Diğer"]}
              - {label: "Kısa açıklama", name: "description", widget: "text", required: false}
              - label: "Ürün özellikleri"
                name: "featureText"
                widget: "text"
                required: false
                hint: "Her özelliği ayrı satıra yazın. Sitede alt alta görünür."
              - {label: "Fiyat", name: "price", widget: "string", required: false}
              - {label: "Etiket", name: "badge", widget: "select", required: false, options: ["Yeni", "Kampanya", "Çok Satan", "Tavsiye Edilen"]}
              - {label: "Sıralama", name: "order", widget: "number", required: false, value_type: "int", default: 100}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "works_management"
    label: "Yaptığımız İşler"
    files:
      - name: "works"
        label: "İş Galerisi"
        file: "works.json"
        format: "json"
        fields:
          - label: "Çalışmalar"
            name: "works"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - {label: "Kapak fotoğrafı", name: "image", widget: "image"}
              - label: "Diğer fotoğraflar"
                name: "images"
                widget: "list"
                required: false
                default: []
                field: {label: "Fotoğraf", name: "image", widget: "image", required: false}
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Kategori", name: "category", widget: "select", options: ["Montaj", "Filtre Değişimi", "Teknik Servis", "Cihaz Satışı", "Diğer"]}
              - {label: "İlçe / konum", name: "location", widget: "string", required: false}
              - {label: "Tarih", name: "date", widget: "datetime", format: "DD.MM.YYYY", date_format: "DD.MM.YYYY", time_format: false, required: false}
              - {label: "Açıklama", name: "text", widget: "text", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "campaigns_management"
    label: "Kampanyalar"
    files:
      - name: "campaigns"
        label: "Kampanya Listesi"
        file: "campaigns.json"
        format: "json"
        fields:
          - label: "Kampanyalar"
            name: "campaigns"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}}"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Açıklama", name: "text", widget: "text"}
              - {label: "Görsel", name: "image", widget: "image"}
              - label: "Fiyat kartları"
                name: "prices"
                widget: "list"
                required: false
                fields:
                  - {label: "Ürün / hizmet", name: "title", widget: "string"}
                  - {label: "Fiyat", name: "price", widget: "string"}
                  - {label: "Not", name: "note", widget: "string", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "testimonials_management"
    label: "Müşteri Yorumları"
    files:
      - name: "testimonials"
        label: "Yorum Listesi"
        file: "testimonials.json"
        format: "json"
        fields:
          - label: "Yorumlar"
            name: "testimonials"
            widget: "list"
            add_to_top: true
            summary: "{{fields.name}} — {{fields.rating}} yıldız"
            fields:
              - {label: "Müşteri adı", name: "name", widget: "string"}
              - {label: "İlçe / konum", name: "location", widget: "string", required: false}
              - {label: "Yıldız", name: "rating", widget: "number", min: 1, max: 5, value_type: "int", default: 5}
              - {label: "Yorum", name: "text", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "services_management"
    label: "Hizmetler"
    files:
      - name: "services"
        label: "Hizmet Listesi"
        file: "services.json"
        format: "json"
        fields:
          - label: "Hizmetler"
            name: "services"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}}"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Açıklama", name: "text", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "faqs_management"
    label: "S.S.S."
    files:
      - name: "faqs"
        label: "Soru Listesi"
        file: "faqs.json"
        format: "json"
        fields:
          - label: "Sorular"
            name: "faqs"
            widget: "list"
            add_to_top: true
            summary: "{{fields.q}}"
            fields:
              - {label: "Soru", name: "q", widget: "string"}
              - {label: "Cevap", name: "a", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "settings_management"
    label: "Site Ayarları"
    files:
      - name: "settings"
        label: "İletişim ve Görünürlük"
        file: "settings.json"
        format: "json"
        fields:
          - {label: "İşletme adı", name: "businessName", widget: "string", required: false}
          - {label: "Logo", name: "logoImage", widget: "image", required: false}
          - {label: "Üst bilgi", name: "topbarText", widget: "string", required: false}
          - {label: "Telefon görünümü", name: "phoneDisplay", widget: "string", required: false}
          - {label: "Telefon / WhatsApp (90 ile)", name: "phoneLink", widget: "string", required: false}
          - {label: "WhatsApp mesajı", name: "whatsappMessage", widget: "text", required: false}
          - {label: "Facebook", name: "facebook", widget: "string", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "Adres / hizmet alanı", name: "addressText", widget: "string", required: false}
          - {label: "Alt bilgi", name: "footerText", widget: "string", required: false}
          - {label: "Hizmet bölgeleri", name: "areas", widget: "list", required: false, field: {label: "Bölge", name: "item", widget: "string"}}
          - label: "Bölüm görünürlükleri"
            name: "visibility"
            widget: "object"
            required: false
            fields:
              - {label: "Ürünler", name: "products", widget: "boolean", default: true}
              - {label: "Kampanya", name: "campaign", widget: "boolean", default: true}
              - {label: "Hizmetler", name: "services", widget: "boolean", default: true}
              - {label: "Yaptığımız işler", name: "works", widget: "boolean", default: true}
              - {label: "Kurumsal", name: "about", widget: "boolean", default: true}
              - {label: "Yorumlar", name: "testimonials", widget: "boolean", default: true}
              - {label: "Hizmet bölgeleri", name: "areas", widget: "boolean", default: true}
              - {label: "S.S.S.", name: "faq", widget: "boolean", default: true}

  - name: "seo_management"
    label: "SEO"
    files:
      - name: "seo"
        label: "Google Ayarları"
        file: "seo.json"
        format: "json"
        fields:
          - {label: "Google sayfa başlığı", name: "seoTitle", widget: "string", required: false}
          - {label: "Google açıklaması", name: "seoDescription", widget: "text", required: false}
          - {label: "Sosyal paylaşım görseli", name: "seoImage", widget: "image", required: false}
          - {label: "Google Search Console doğrulama kodu", name: "googleSiteVerification", widget: "string", required: false}
