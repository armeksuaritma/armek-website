backend:
  name: github
  repo: armeksuaritma/armek-website
  branch: main
  base_url: https://armek-cms-auth.armeksuaritma.workers.dev
  auth_endpoint: auth

site_url: https://armeksuaritma.com.tr
display_url: https://armeksuaritma.com.tr
logo_url: /armek-logo.jpg
locale: tr
media_folder: "uploads"
public_folder: "/uploads"
publish_mode: simple

collections:
  - name: "products"
    label: "Ürünler"
    label_singular: "Ürün"
    folder: "content/products"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{category}}"
    sortable_fields: ["name", "category", "price"]
    view_filters:
      - {label: "Su Arıtma Cihazları", field: "category", pattern: "Su Arıtma Cihazları"}
      - {label: "Filtreler", field: "category", pattern: "Filtreler"}
      - {label: "Tanklar", field: "category", pattern: "Tanklar"}
      - {label: "Yedek Parçalar", field: "category", pattern: "Yedek Parçalar"}
    fields:
      - {label: "Ürün adı", name: "name", widget: "string"}
      - {label: "Kapak ürün fotoğrafı", name: "image", widget: "image"}
      - label: "Ürün fotoğraf galerisi"
        name: "images"
        widget: "list"
        required: false
        default: []
        field: {label: "Ek fotoğraf", name: "image", widget: "image", required: false}
      - {label: "Kategori", name: "category", widget: "select", options: ["Su Arıtma Cihazları", "Filtreler", "Tanklar", "Yedek Parçalar", "Diğer"]}
      - {label: "Kısa açıklama", name: "description", widget: "text"}
      - {label: "Fiyat", name: "price", widget: "string", required: false}
      - {label: "Kampanya etiketi", name: "badge", widget: "string", required: false}
      - label: "Özellikler"
        name: "features"
        widget: "list"
        required: false
        default: []
        field: {label: "Özellik", name: "item", widget: "string"}
      - {label: "Sıralama", name: "order", widget: "number", required: false, default: 100, value_type: "int"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}

  - name: "works"
    label: "Yaptığımız İşler"
    label_singular: "İş Kaydı"
    folder: "content/works"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{location}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Kapak fotoğrafı", name: "image", widget: "image"}
      - label: "Diğer fotoğraflar"
        name: "images"
        widget: "list"
        required: false
        default: []
        field: {label: "Fotoğraf", name: "image", widget: "image", required: false}
      - {label: "Kategori", name: "category", widget: "select", options: ["Montaj", "Filtre Değişimi", "Teknik Servis", "Cihaz Satışı", "Diğer"]}
      - {label: "Konum / ilçe", name: "location", widget: "string", required: false}
      - {label: "Tarih", name: "date", widget: "datetime", format: "DD.MM.YYYY", date_format: "DD.MM.YYYY", time_format: false, required: false}
      - {label: "Açıklama", name: "text", widget: "text", required: false}
      - {label: "Sıralama", name: "order", widget: "number", required: false, default: 100, value_type: "int"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}

  - name: "testimonials"
    label: "Müşteri Yorumları"
    label_singular: "Müşteri Yorumu"
    folder: "content/testimonials"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{rating}} yıldız"
    fields:
      - {label: "Müşteri adı", name: "name", widget: "string"}
      - {label: "İlçe / konum", name: "location", widget: "string", required: false}
      - {label: "Yıldız puanı", name: "rating", widget: "number", min: 1, max: 5, value_type: "int", default: 5}
      - {label: "Yorum", name: "text", widget: "text"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}

  - name: "services"
    label: "Hizmetler"
    label_singular: "Hizmet"
    folder: "content/services"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Açıklama", name: "text", widget: "text"}
      - {label: "Sıralama", name: "order", widget: "number", required: false, default: 100, value_type: "int"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}

  - name: "campaigns"
    label: "Kampanyalar"
    label_singular: "Kampanya"
    folder: "content/campaigns"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - {label: "Kampanya başlığı", name: "title", widget: "string"}
      - {label: "Kampanya açıklaması", name: "text", widget: "text"}
      - {label: "Kampanya görseli", name: "image", widget: "image"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}
      - label: "Fiyatlar"
        name: "prices"
        widget: "list"
        required: false
        default: []
        summary: "{{fields.title}} — {{fields.price}}"
        fields:
          - {label: "Ürün/Hizmet", name: "title", widget: "string"}
          - {label: "Fiyat", name: "price", widget: "string"}
          - {label: "Alt not", name: "note", widget: "string", required: false}

  - name: "faqs"
    label: "S.S.S."
    label_singular: "Soru"
    folder: "content/faqs"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "q"
    summary: "{{q}}"
    fields:
      - {label: "Soru", name: "q", widget: "string"}
      - {label: "Cevap", name: "a", widget: "text"}
      - {label: "Sıralama", name: "order", widget: "number", required: false, default: 100, value_type: "int"}
      - {label: "Yayında", name: "visible", widget: "boolean", default: true}

  - name: "site"
    label: "Site Ayarları"
    files:
      - name: "content"
        label: "Ana Sayfa ve Genel Ayarlar"
        file: "content.json"
        format: "json"
        fields:
          - {label: "İşletme adı", name: "businessName", widget: "string"}
          - {label: "Logo", name: "logoImage", widget: "image"}
          - {label: "Üst bilgi", name: "topbarText", widget: "string", required: false}
          - {label: "Telefon görünümü", name: "phoneDisplay", widget: "string"}
          - {label: "Telefon/WhatsApp (90 ile)", name: "phoneLink", widget: "string"}
          - {label: "WhatsApp hazır mesajı", name: "whatsappMessage", widget: "text"}
          - {label: "Facebook", name: "facebook", widget: "string", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "Adres / hizmet alanı", name: "addressText", widget: "string"}
          - {label: "Alt bilgi", name: "footerText", widget: "string"}
          - label: "Bölüm görünürlükleri"
            name: "visibility"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Ürünler görünsün", name: "products", widget: "boolean", default: true}
              - {label: "Kampanya görünsün", name: "campaign", widget: "boolean", default: true}
              - {label: "Hizmetler görünsün", name: "services", widget: "boolean", default: true}
              - {label: "Yaptığımız işler görünsün", name: "works", widget: "boolean", default: true}
              - {label: "Kurumsal bölüm görünsün", name: "about", widget: "boolean", default: true}
              - {label: "Müşteri yorumları görünsün", name: "testimonials", widget: "boolean", default: true}
              - {label: "Hizmet bölgeleri görünsün", name: "areas", widget: "boolean", default: true}
              - {label: "S.S.S. görünsün", name: "faq", widget: "boolean", default: true}
          - {label: "Üst küçük başlık", name: "heroEyebrow", widget: "string"}
          - {label: "Ana başlık", name: "heroTitle", widget: "string"}
          - {label: "Ana açıklama", name: "heroText", widget: "text"}
          - {label: "Tek ana görsel", name: "heroImage", widget: "image", required: false}
          - label: "Hareketli ana görseller"
            name: "heroSlides"
            widget: "list"
            required: false
            default: []
            fields:
              - {label: "Görsel", name: "image", widget: "image"}
              - {label: "Görsel açıklaması", name: "alt", widget: "string", required: false}
          - {label: "Deneyim sayacı", name: "statExperience", widget: "string", required: false}
          - {label: "Servis sayacı", name: "statService", widget: "string", required: false}
          - {label: "Ürünler bölüm başlığı", name: "productsTitle", widget: "string", required: false}
          - {label: "Ürünler bölüm açıklaması", name: "productsText", widget: "text", required: false}
          - {label: "Kurumsal görsel", name: "aboutImage", widget: "image"}
          - {label: "Kurumsal başlık", name: "aboutTitle", widget: "string"}
          - {label: "Kurumsal açıklama", name: "aboutText", widget: "text"}
          - {label: "Avantajlarımız", name: "advantages", widget: "list", required: false, field: {label: "Avantaj", name: "item", widget: "string"}}
          - {label: "Hizmet bölgeleri", name: "areas", widget: "list", required: false, field: {label: "Bölge", name: "item", widget: "string"}}
          - {label: "Sayfa başlığı", name: "seoTitle", widget: "string", required: false}
          - {label: "Sayfa açıklaması", name: "seoDescription", widget: "text", required: false}
          - {label: "Sosyal paylaşım görseli", name: "seoImage", widget: "image", required: false}
