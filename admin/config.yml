backend:
  name: github
  repo: armeksuaritma/armek-website
  branch: main
  base_url: https://armek-cms-auth.armeksuaritma.workers.dev
  auth_endpoint: auth

site_url: https://armeksuaritma.com.tr
display_url: https://armeksuaritma.com.tr
logo_url: /armek-logo.jpg
locale: tr
media_folder: "uploads"
public_folder: "/uploads"
publish_mode: simple

collections:
  - name: "products_management"
    label: "Ürünler"
    files:
      - name: "products"
        label: "Ürün Listesi"
        file: "products.json"
        format: "json"
        fields:
          - label: "Ürünler"
            name: "products"
            widget: "list"
            add_to_top: true
            summary: "{{fields.name}} — {{fields.category}}"
            fields:
              - {label: "Kapak fotoğrafı", name: "image", widget: "image"}
              - label: "Ürün fotoğraf galerisi"
                name: "images"
                widget: "list"
                required: false
                default: []
                field: {label: "Ek fotoğraf", name: "image", widget: "image", required: false}
              - {label: "Ürün adı", name: "name", widget: "string"}
              - {label: "Marka", name: "brand", widget: "string", required: false}
              - {label: "Model", name: "model", widget: "string", required: false}
              - {label: "Kategori", name: "category", widget: "select", options: ["Su Arıtma Cihazları", "Filtreler", "Tanklar", "Yedek Parçalar", "Diğer"]}
              - {label: "Kısa açıklama", name: "description", widget: "text"}
              - {label: "Fiyat", name: "price", widget: "string", required: false}
              - {label: "Etiket", name: "badge", widget: "select", required: false, options: ["Yeni", "Kampanya", "Çok Satan", "Tavsiye Edilen"]}
              - label: "Özellikler"
                name: "features"
                widget: "list"
                required: false
                default: []
                field: {label: "Özellik", name: "item", widget: "string"}
              - {label: "Aşama sayısı", name: "stages", widget: "string", required: false}
              - {label: "Kapasite", name: "capacity", widget: "string", required: false}
              - {label: "Garanti", name: "warranty", widget: "string", required: false}
              - {label: "Stok durumu", name: "stockStatus", widget: "select", required: false, options: ["Stokta", "Sipariş Üzerine", "Tükendi"]}
              - {label: "Sıralama", name: "order", widget: "number", required: false, value_type: "int", default: 100}
              - {label: "Öne çıkan ürün", name: "featured", widget: "boolean", default: false}
              - {label: "YouTube video bağlantısı", name: "video", widget: "string", required: false}
              - {label: "PDF katalog bağlantısı", name: "catalog", widget: "string", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "works_management"
    label: "Yaptığımız İşler"
    files:
      - name: "works"
        label: "İş Galerisi"
        file: "works.json"
        format: "json"
        fields:
          - label: "Çalışmalar"
            name: "works"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - {label: "Kapak fotoğrafı", name: "image", widget: "image"}
              - label: "Diğer fotoğraflar"
                name: "images"
                widget: "list"
                required: false
                default: []
                field: {label: "Fotoğraf", name: "image", widget: "image", required: false}
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Kategori", name: "category", widget: "select", options: ["Montaj", "Filtre Değişimi", "Teknik Servis", "Cihaz Satışı", "Diğer"]}
              - {label: "İlçe / konum", name: "location", widget: "string", required: false}
              - {label: "Tarih", name: "date", widget: "datetime", format: "DD.MM.YYYY", date_format: "DD.MM.YYYY", time_format: false, required: false}
              - {label: "Açıklama", name: "text", widget: "text", required: false}
              - {label: "Öncesi fotoğrafı", name: "beforeImage", widget: "image", required: false}
              - {label: "Sonrası fotoğrafı", name: "afterImage", widget: "image", required: false}
              - {label: "Kullanılan ürün / cihaz", name: "usedProduct", widget: "string", required: false}
              - {label: "İşlem süresi", name: "duration", widget: "string", required: false}
              - {label: "Harita bağlantısı", name: "mapUrl", widget: "string", required: false}
              - {label: "Video bağlantısı", name: "video", widget: "string", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "campaigns_management"
    label: "Kampanyalar"
    files:
      - name: "campaigns"
        label: "Kampanya Listesi"
        file: "campaigns.json"
        format: "json"
        fields:
          - label: "Kampanyalar"
            name: "campaigns"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}}"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Açıklama", name: "text", widget: "text"}
              - {label: "Görsel", name: "image", widget: "image"}
              - {label: "Başlangıç tarihi", name: "startDate", widget: "datetime", required: false, date_format: "DD.MM.YYYY", time_format: false}
              - {label: "Bitiş tarihi", name: "endDate", widget: "datetime", required: false, date_format: "DD.MM.YYYY", time_format: false}
              - {label: "Öne çıkar", name: "featured", widget: "boolean", default: false}
              - label: "Fiyat kartları"
                name: "prices"
                widget: "list"
                required: false
                fields:
                  - {label: "Ürün / hizmet", name: "title", widget: "string"}
                  - {label: "Fiyat", name: "price", widget: "string"}
                  - {label: "Not", name: "note", widget: "string", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "testimonials_management"
    label: "Müşteri Yorumları"
    files:
      - name: "testimonials"
        label: "Yorum Listesi"
        file: "testimonials.json"
        format: "json"
        fields:
          - label: "Yorumlar"
            name: "testimonials"
            widget: "list"
            add_to_top: true
            summary: "{{fields.name}} — {{fields.rating}} yıldız"
            fields:
              - {label: "Müşteri adı", name: "name", widget: "string"}
              - {label: "İlçe / konum", name: "location", widget: "string", required: false}
              - {label: "Yıldız", name: "rating", widget: "number", min: 1, max: 5, value_type: "int", default: 5}
              - {label: "Profil fotoğrafı", name: "image", widget: "image", required: false}
              - {label: "Yorum tarihi", name: "date", widget: "datetime", required: false, date_format: "DD.MM.YYYY", time_format: false}
              - {label: "Yorum", name: "text", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "services_management"
    label: "Hizmetler"
    files:
      - name: "services"
        label: "Hizmet Listesi"
        file: "services.json"
        format: "json"
        fields:
          - label: "Hizmetler"
            name: "services"
            widget: "list"
            add_to_top: true
            summary: "{{fields.title}}"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Açıklama", name: "text", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "faqs_management"
    label: "S.S.S."
    files:
      - name: "faqs"
        label: "Soru Listesi"
        file: "faqs.json"
        format: "json"
        fields:
          - label: "Sorular"
            name: "faqs"
            widget: "list"
            add_to_top: true
            summary: "{{fields.q}}"
            fields:
              - {label: "Soru", name: "q", widget: "string"}
              - {label: "Cevap", name: "a", widget: "text"}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}

  - name: "site_management"
    label: "Site Ayarları"
    files:
      - name: "content"
        label: "Genel Site İçeriği"
        file: "content.json"
        format: "json"
        fields:
          - {label: "İşletme adı", name: "businessName", widget: "string"}
          - {label: "Logo", name: "logoImage", widget: "image"}
          - {label: "Üst bilgi", name: "topbarText", widget: "string", required: false}
          - {label: "Telefon görünümü", name: "phoneDisplay", widget: "string"}
          - {label: "Telefon / WhatsApp", name: "phoneLink", widget: "string"}
          - {label: "WhatsApp mesajı", name: "whatsappMessage", widget: "text"}
          - {label: "Facebook", name: "facebook", widget: "string", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "YouTube", name: "youtube", widget: "string", required: false}
          - {label: "TikTok", name: "tiktok", widget: "string", required: false}
          - {label: "E-posta", name: "email", widget: "string", required: false}
          - {label: "Çalışma saatleri", name: "workingHours", widget: "string", required: false}
          - {label: "Google yorum bağlantısı", name: "googleReviewUrl", widget: "string", required: false}
          - {label: "Google harita embed bağlantısı", name: "mapEmbed", widget: "string", required: false}
          - {label: "Adres", name: "addressText", widget: "string"}
          - {label: "Alt bilgi", name: "footerText", widget: "string"}
          - {label: "Ana sayfa küçük başlık", name: "heroEyebrow", widget: "string"}
          - {label: "Ana sayfa başlık", name: "heroTitle", widget: "string"}
          - {label: "Ana sayfa açıklama", name: "heroText", widget: "text"}
          - {label: "Ana sayfa görseli", name: "heroImage", widget: "image", required: false}
          - label: "Hareketli ana görseller"
            name: "heroSlides"
            widget: "list"
            required: false
            default: []
            fields:
              - {label: "Görsel", name: "image", widget: "image"}
              - {label: "Açıklama", name: "alt", widget: "string", required: false}
              - {label: "Slayt başlığı", name: "title", widget: "string", required: false}
              - {label: "Slayt metni", name: "text", widget: "text", required: false}
              - {label: "Buton yazısı", name: "buttonLabel", widget: "string", required: false}
              - {label: "Buton bağlantısı", name: "buttonUrl", widget: "string", required: false}
          - {label: "Deneyim sayacı", name: "statExperience", widget: "string", required: false}
          - {label: "Servis sayacı", name: "statService", widget: "string", required: false}
          - {label: "Kurumsal görsel", name: "aboutImage", widget: "image"}
          - {label: "Kurumsal başlık", name: "aboutTitle", widget: "string", required: false}
          - {label: "Kurumsal açıklama", name: "aboutText", widget: "text", required: false}
          - {label: "Avantajlar", name: "advantages", widget: "list", required: false, field: {label: "Avantaj", name: "item", widget: "string"}}
          - {label: "Hizmet bölgeleri", name: "areas", widget: "list", required: false, field: {label: "Bölge", name: "item", widget: "string"}}
          - label: "Bölüm görünürlükleri"
            name: "visibility"
            widget: "object"
            required: false
            fields:
              - {label: "Ürünler", name: "products", widget: "boolean", default: true}
              - {label: "Kampanya", name: "campaign", widget: "boolean", default: true}
              - {label: "Hizmetler", name: "services", widget: "boolean", default: true}
              - {label: "Yaptığımız işler", name: "works", widget: "boolean", default: true}
              - {label: "Kurumsal", name: "about", widget: "boolean", default: true}
              - {label: "Yorumlar", name: "testimonials", widget: "boolean", default: true}
              - {label: "Hizmet bölgeleri", name: "areas", widget: "boolean", default: true}
              - {label: "S.S.S.", name: "faq", widget: "boolean", default: true}
              - {label: "Markalar", name: "brands", widget: "boolean", default: true}
              - {label: "Öncesi / Sonrası", name: "beforeAfter", widget: "boolean", default: true}
          - label: "Markalar ve referanslar"
            name: "brands"
            widget: "list"
            required: false
            default: []
            summary: "{{fields.name}}"
            fields:
              - {label: "Marka / referans adı", name: "name", widget: "string"}
              - {label: "Logo", name: "logo", widget: "image", required: false}
              - {label: "Web bağlantısı", name: "url", widget: "string", required: false}
              - {label: "Yayında", name: "active", widget: "boolean", default: true}
          - {label: "SEO başlığı", name: "seoTitle", widget: "string", required: false}
          - {label: "SEO açıklaması", name: "seoDescription", widget: "text", required: false}
          - {label: "Paylaşım görseli", name: "seoImage", widget: "image", required: false}
          # Eski content.json kayıtlarının kaybolmaması için aşağıdaki alanlar korunur.
          - {label: "Eski ürün kayıtları", name: "products", widget: "hidden", required: false, default: []}
          - {label: "Eski iş kayıtları", name: "works", widget: "hidden", required: false, default: []}
          - {label: "Eski yorum kayıtları", name: "testimonials", widget: "hidden", required: false, default: []}
          - {label: "Eski hizmet kayıtları", name: "services", widget: "hidden", required: false, default: []}
          - {label: "Eski S.S.S. kayıtları", name: "faqs", widget: "hidden", required: false, default: []}
          - {label: "Eski fiyat kayıtları", name: "prices", widget: "hidden", required: false, default: []}
          - {label: "Eski kampanya başlığı", name: "campaignTitle", widget: "hidden", required: false}
          - {label: "Eski kampanya açıklaması", name: "campaignText", widget: "hidden", required: false}
          - {label: "Eski kampanya görseli", name: "campaignImage", widget: "hidden", required: false}
          - {label: "Eski kampanya görünürlüğü", name: "campaignVisible", widget: "hidden", required: false, default: true}
