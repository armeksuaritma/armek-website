backend:
  name: git-gateway
  branch: main
media_folder: "uploads"
public_folder: "/uploads"
locale: "tr"
collections:
  - name: "site"
    label: "Site Ayarları"
    files:
      - name: "content"
        label: "Ana Site İçeriği"
        file: "content.json"
        format: "json"
        fields:
          - {label: "İşletme adı", name: "businessName", widget: "string"}
          - {label: "Logo Görseli", name: "logoImage", widget: "image"}
          - {label: "Üst küçük başlık", name: "heroEyebrow", widget: "string"}
          - {label: "Ana başlık", name: "heroTitle", widget: "string"}
          - {label: "Ana açıklama", name: "heroText", widget: "text"}
          - {label: "Telefon görünümü", name: "phoneDisplay", widget: "string"}
          - {label: "Telefon/WhatsApp numarası (90 ile)", name: "phoneLink", widget: "string"}
          - {label: "WhatsApp hazır mesajı", name: "whatsappMessage", widget: "text"}
          - {label: "Kampanya görünsün", name: "campaignVisible", widget: "boolean", default: true}
          - {label: "Kampanya başlığı", name: "campaignTitle", widget: "string"}
          - {label: "Kampanya açıklaması", name: "campaignText", widget: "text"}
          - {label: "Kampanya görseli", name: "campaignImage", widget: "image"}
          - label: "Hizmetler"
            name: "services"
            widget: "list"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Açıklama", name: "text", widget: "text"}
          - {label: "Hizmet bölgeleri", name: "areas", widget: "list"}
          - label: "Sık Sorulan Sorular"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Soru", name: "q", widget: "string"}
              - {label: "Cevap", name: "a", widget: "text"}
          - {label: "Facebook", name: "facebook", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string"}
          - {label: "Adres/Hizmet alanı", name: "addressText", widget: "string"}
          - {label: "Alt bilgi", name: "footerText", widget: "string"}
          - label: "Yaptığımız İşler (Galeri)"
            name: "gallery"
            widget: "list"
            required: false
            fields:
              - {label: "İş/Proje Adı", name: "title", widget: "string"}
              - {label: "Fotoğraf", name: "image", widget: "image"}
