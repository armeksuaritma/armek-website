name: Build and deploy ARMEK SEO site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: SEO sayfalarını oluştur
        run: npm run build

      - name: Pages ayarları
        uses: actions/configure-pages@v5

      - name: Yayın dosyalarını hazırla
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v4
